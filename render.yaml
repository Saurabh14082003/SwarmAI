services:
  - type: web
    name: swarmai-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run interface/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
